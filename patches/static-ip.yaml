machine:
  network:
    interfaces:
      - interface: eno1
        dhcp: false
        addresses:
          - 192.168.1.10/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
        mtu: 1500
    nameservers:
      - 1.1.1.1
      - 1.0.0.1

cluster:
  controlPlane:
    endpoint: https://192.168.1.10:6443
